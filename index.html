<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Codename : Zetta</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body{
      background:#1b1b1b;
      color:white;
      overflow-x:hidden;
    }

    .container{
      width:90%;
      max-width:900px;
      margin:auto;
      padding:30px 0;
    }

    /* PROFILE */
    .profile-section{
      text-align:center;
      margin-bottom:30px;
    }

    .profile-img{
      width:120px;
      height:120px;
      border-radius:50%;
      object-fit:cover;
      border:4px solid white;
      box-shadow:0 0 20px rgba(255,255,255,0.2);
    }

    .title{
      margin-top:15px;
      font-size:32px;
      font-weight:bold;
    }

    .subtitle{
      margin-top:8px;
      color:red;
      font-size:18px;
      font-weight:bold;
    }

    .description{
      margin-top:12px;
      color:#d1d1d1;
      font-size:15px;
      line-height:1.6;
    }

    /* TOP BUTTONS */
    .top-links{
      margin-top:35px;
      display:grid;
      grid-template-columns:repeat(1,1fr);
      gap:15px;
    }

    .link-box{
      background:#2a2a2a;
      border-radius:20px;
      padding:15px;
      display:flex;
      align-items:center;
      gap:15px;
      text-decoration:none;
      color:white;
      transition:0.3s;
      border:1px solid rgba(255,255,255,0.08);
    }

    .link-box:hover{
      transform:scale(1.02);
      background:#333;
    }

    .link-box img{
      width:60px;
      height:60px;
      border-radius:15px;
      object-fit:cover;
    }

    /* MENU BUTTONS */
    .menu-buttons{
      margin-top:40px;
      display:grid;
      grid-template-columns:repeat(2,1fr);
      gap:15px;
    }

    .menu-buttons a{
      background:#2b2b2b;
      border-radius:18px;
      overflow:hidden;
      height:90px;
      display:block;
      transition:0.3s;
    }

    .menu-buttons a:hover{
      transform:scale(1.03);
    }

    .menu-buttons img{
      width:100%;
      height:100%;
      object-fit:cover;
    }

    /* SLIDER */
    .slider-title{
      margin-top:50px;
      margin-bottom:15px;
      font-size:24px;
      font-weight:bold;
    }

    .slider{
      display:flex;
      gap:15px;
      overflow-x:auto;
      scroll-behavior:smooth;
      padding-bottom:10px;
    }

    .slider::-webkit-scrollbar{
      display:none;
    }

    .slide-card{
      min-width:300px;
      background:#262626;
      border-radius:20px;
      overflow:hidden;
      flex-shrink:0;
    }

    .slide-card img{
      width:100%;
      height:170px;
      object-fit:cover;
      display:block;
    }

    .slide-card p{
      padding:12px;
      font-weight:bold;
    }

    /* SECTION */
    .section-title{
      margin-top:50px;
      margin-bottom:20px;
      font-size:28px;
      font-weight:bold;
    }

    .card-grid{
      display:grid;
      grid-template-columns:repeat(2,1fr);
      gap:20px;
    }

    .content-card{
      background:#262626;
      border-radius:20px;
      overflow:hidden;
      transition:0.3s;
      text-decoration:none;
      color:white;
    }

    .content-card:hover{
      transform:translateY(-5px);
    }

    .content-card img{
      width:100%;
      height:180px;
      object-fit:cover;
    }

    .content-card p{
      padding:12px;
      font-weight:bold;
      text-align:center;
    }

    /* CONTENT SECTION */
    .content-slider{
      display:flex;
      flex-direction:column;
      gap:20px;
    }

    .youtube-card{
      background:#262626;
      border-radius:20px;
      overflow:hidden;
      text-decoration:none;
      color:white;
    }

    .youtube-card img{
      width:100%;
      height:200px;
      object-fit:cover;
    }

    .youtube-card p{
      padding:15px;
      font-weight:bold;
    }

    /* FOOTER */
    footer{
      margin-top:60px;
      text-align:center;
      padding:25px;
      background:#151515;
      font-weight:bold;
      font-size:20px;
      backdrop-filter:blur(10px);
      border-top:1px solid rgba(255,255,255,0.08);
    }

    /* RESPONSIVE */
    @media(max-width:700px){

      .card-grid{
        grid-template-columns:1fr;
      }

      .menu-buttons{
        grid-template-columns:1fr;
      }

      .slide-card{
        min-width:260px;
      }

    }

  </style>
</head>

  <!-- AUTO SCROLL JS -->
  <script>

    const slider = document.getElementById('slider');

    let scrollAmount = 0;

    setInterval(() => {

      scrollAmount += 1;

      slider.scrollLeft = scrollAmount;

      if(scrollAmount >= slider.scrollWidth - slider.clientWidth){
        scrollAmount = 0;
      }

    }, 20);

  </script>
